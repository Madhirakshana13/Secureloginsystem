<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .dashboard-card{
            width:500px;
            border:none;
            border-radius:20px;
            padding:30px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .icon{
            font-size:60px;
        }

        .logout-btn{
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="card dashboard-card text-center">

    <div class="icon">🛡️</div>

    <h2 class="mt-3">Secure Login Dashboard</h2>

    <hr>

    <h4>
        Welcome, <span class="text-primary">{{ user }}</span> 👋
    </h4>

    <p class="text-muted mt-3">
    You have successfully authenticated using password hashing, secure session management, and protected login validation. </p>

    <div class="alert alert-success">
        Authentication Successful
    </div>

    <a href="/logout" class="btn btn-danger logout-btn">
        Logout
    </a>

</div>

</body>
</html>
